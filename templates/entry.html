{% extends "base.html" %}
{% block title %}Entry{% endblock %}

{% block head %}
<style>
/* ── Import bar ─────────────────────────────────────────────────────────── */
.import-bar{padding:8px 0 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:14px}
.import-label{font-family:var(--mono);font-size:.73rem;letter-spacing:.10em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.import-sep{font-family:var(--mono);font-size:.73rem;color:var(--text3)}
.lseg-sel{font-family:var(--mono);font-size:.73rem;color:var(--text);background:var(--surface2);border:1px solid var(--border2);border-radius:2px;padding:4px 8px;cursor:pointer;max-width:260px}
.import-file-lbl{display:inline-flex;align-items:center;font-family:var(--mono);font-size:.73rem;color:var(--text2);background:var(--surface2);border:1px solid var(--border2);border-radius:2px;padding:4px 10px;cursor:pointer;gap:6px;white-space:nowrap}
.import-file-lbl:hover{border-color:var(--accent);color:var(--text)}
.import-file-native{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
.btn-import{font-family:var(--mono);font-size:.73rem;padding:4px 14px;border:1px solid var(--border2);border-radius:2px;background:var(--surface2);color:var(--text2);cursor:pointer;white-space:nowrap}
.btn-import:hover{background:var(--surface);color:var(--text)}
.btn-import:disabled{opacity:.4;cursor:default}
.btn-import-green{border-color:var(--sig-sb-bd);color:var(--sig-sb)}
.btn-import-green:hover{background:var(--sig-sb-bg)}

/* ── Recompute section ──────────────────────────────────────────────────── */
.recompute-section{margin-top:28px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:4px}
.recompute-section h3{font-family:var(--mono);font-size:.73rem;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--text3);margin:0 0 14px}
.recompute-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
</style>
{% endblock %}

{% block content %}
<div style="padding:28px 32px 60px;max-width:900px">

<div style="font-family:var(--mono);font-size:.73rem;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--text3);margin-bottom:18px">Weekly Data Upload</div>

{# LSEG import bar #}
<div class="import-bar">
  <form id="lseg-form-w" method="POST" action="/entry/import-lseg" enctype="multipart/form-data"
        style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span class="import-label">&#8593; Single ETF:</span>
    <select class="lseg-sel" name="ticker" required>
      {% for t in tickers %}
      <option value="{{ t.ticker }}">{{ t.ticker }} &mdash; {{ (t.name or '')[:32] }}</option>
      {% endfor %}
    </select>
    <label class="import-file-lbl" id="lseg-lbl-w">
      <input type="file" name="lseg_file" accept=".xlsx,.xls" class="import-file-native" id="lseg-file-w" required>
      <span id="lseg-txt-w">&#128194; Choose file&hellip;</span>
    </label>
    <button type="submit" class="btn-import btn-import-green" id="lseg-sub-w" disabled>IMPORT</button>
  </form>
  <span class="import-sep">&mdash; or &mdash;</span>
  <form id="bulk-form" method="POST" action="/entry/import-lseg-bulk" enctype="multipart/form-data"
        style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span class="import-label">&#8593; Bulk (all ETFs):</span>
    <label class="import-file-lbl" id="bulk-lbl">
      <input type="file" name="bulk_files" accept=".xlsx,.xls" multiple
             class="import-file-native" id="bulk-file"
             onchange="updateBulkLabel(this)">
      <span id="bulk-txt">&#128194; Choose files&hellip; <span style="font-size:.67rem;opacity:.6">(named TICKER.xlsx)</span></span>
    </label>
    <button type="submit" class="btn-import btn-import-green" id="bulk-sub" disabled>IMPORT ALL</button>
  </form>
</div>

{# Recompute section #}
<div class="recompute-section">
  <h3>Recompute Signals</h3>
  <form method="post" action="/recompute">
    <div class="recompute-row">
      <label style="font-family:var(--mono);font-size:.73rem;color:var(--text3);white-space:nowrap">As of Friday</label>
      <input type="date" name="as_of_date"
             style="font-family:var(--mono);font-size:.73rem;color:var(--text);background:var(--surface2);border:1px solid var(--border2);border-radius:2px;padding:5px 10px;outline:none">
      <span style="font-family:var(--mono);font-size:.67rem;color:var(--text3)">Leave blank to use latest data</span>
      <button type="submit" class="btn-import btn-import-green" style="margin-left:auto">&#8635; RECOMPUTE</button>
    </div>
  </form>
</div>

</div>

<script>
(function(){
  const fi=document.getElementById('lseg-file-w');
  if(fi){fi.addEventListener('change',function(){
    const nm=this.files[0]?this.files[0].name:'';
    document.getElementById('lseg-txt-w').textContent=nm?'📄 '+nm:'📂 Choose file\u2026';
    document.getElementById('lseg-sub-w').disabled=!nm;
  });}
})();

function updateBulkLabel(input){
  const n=input.files.length;
  const lbl=document.getElementById('bulk-txt');
  const btn=document.getElementById('bulk-sub');
  if(n===0){
    lbl.innerHTML='📂 Choose files\u2026 <span style="font-size:.67rem;opacity:.6">(named TICKER.xlsx)</span>';
    btn.disabled=true;
  } else {
    lbl.textContent='📄 '+n+' file'+(n>1?'s':'')+' selected';
    btn.disabled=false;
  }
}
</script>
{% endblock %}
