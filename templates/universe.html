{% extends "base.html" %}
{% block title %}ETF Universe{% endblock %}

{% block head %}
<style>
.page{max-width:none;padding-top:0}

/* ── Layout ─────────────────────────────────────────────────────────────── */
.univ-layout{display:flex;gap:0;align-items:flex-start}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.univ-sidebar{width:185px;flex-shrink:0;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto;overflow-x:hidden;background:var(--surface);border-right:1px solid var(--border);padding:12px 0 40px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.univ-sidebar::-webkit-scrollbar{width:3px}
.univ-sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sb-search{font-family:var(--mono);font-size:.72rem;padding:5px 9px;margin:0 10px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;color:var(--text);outline:none;width:calc(100% - 20px);box-sizing:border-box;transition:border-color .15s}
.sb-search:focus{border-color:var(--accent)}
.sb-search::placeholder{color:var(--text3)}
.sb-sec-hd{font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:8px 12px 3px;display:flex;justify-content:space-between}
.sb-sec-hd em{font-style:normal;opacity:.5;font-weight:400}
.sb-item{display:block;padding:3px 12px;cursor:pointer;font-family:var(--mono);font-size:.72rem;font-weight:600;color:var(--text2);transition:all .1s;border-left:2px solid transparent;white-space:nowrap}
.sb-item:hover{color:var(--text);background:var(--surface2)}
.sb-item.active{color:var(--accent);background:var(--blue-dim);border-left-color:var(--accent)}

/* ── Main ────────────────────────────────────────────────────────────────── */
.univ-main{flex:1;min-width:0;padding:24px 26px 60px}
.univ-hd{margin-bottom:18px}
.univ-title{font-family:var(--mono);font-size:1.15rem;font-weight:700;color:var(--text)}
.univ-sub{font-size:.77rem;color:var(--text2);margin-top:3px}

/* ── Filter bar ──────────────────────────────────────────────────────────── */
.univ-fb{display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.fb-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.fb-label{font-family:var(--mono);font-size:.60rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-right:2px;white-space:nowrap}
.fc{font-family:var(--mono);font-size:.65rem;font-weight:600;padding:3px 7px;border-radius:3px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap}
.fc:hover{border-color:var(--accent);color:var(--text)}
.fc.on{background:var(--blue-dim);border-color:var(--accent);color:var(--accent)}
.univ-count{font-family:var(--mono);font-size:.68rem;color:var(--text3);margin-left:4px}

/* ── Sector groups ───────────────────────────────────────────────────────── */
.sec-group{margin-bottom:28px}
.sec-group-hd{display:flex;align-items:center;gap:10px;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.sec-group-label{font-family:var(--mono);font-size:.68rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3)}
.sec-group-n{font-family:var(--mono);font-size:.62rem;color:var(--text3);opacity:.5}

/* ── ETF grid ────────────────────────────────────────────────────────────── */
.etf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}

/* ── ETF card ────────────────────────────────────────────────────────────── */
.etf-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;transition:border-color .15s,box-shadow .15s;scroll-margin-top:calc(var(--nav-h) + 24px)}
.etf-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.25)}
.etf-card.focused{border-color:var(--accent);box-shadow:0 0 0 2px rgba(74,158,255,.18),0 4px 20px rgba(0,0,0,.3)}
.etf-card-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.etf-ticker{font-family:var(--mono);font-size:.90rem;font-weight:700;color:var(--text)}
.etf-sector-pill{font-family:var(--mono);font-size:.59rem;font-weight:600;padding:2px 6px;border-radius:2px;background:var(--surface3);color:var(--text2);border:1px solid var(--border2);white-space:nowrap;flex-shrink:0}
.etf-fullname{font-family:var(--mono);font-size:.71rem;color:var(--text2);margin-bottom:8px;line-height:1.4}
.etf-desc{font-family:var(--sans);font-size:.78rem;color:var(--text);line-height:1.6;margin-bottom:10px}
.etf-meta{display:flex;flex-wrap:wrap;gap:5px}
.etf-badge{font-family:var(--mono);font-size:.62rem;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:2px;border:1px solid var(--border);white-space:nowrap}
.etf-badge span{color:var(--text2)}
.etf-proxy{font-family:var(--mono);font-size:.62rem;padding:2px 6px;border-radius:2px;border:1px solid rgba(74,158,255,.25);background:rgba(74,158,255,.07);color:var(--sig-ah);white-space:nowrap}
</style>
{% endblock %}

{% block content %}
<div class="univ-layout">

  <!-- ── Sidebar ── -->
  <div class="univ-sidebar">
    <input class="sb-search" id="sb-search" type="text" placeholder="Filter tickers…" oninput="sbFilter()">
    <div id="sb-list"></div>
  </div>

  <!-- ── Main ── -->
  <div class="univ-main">
    <div class="univ-hd">
      <div class="univ-title">ETF <strong>Universe</strong></div>
      <div class="univ-sub">{{ etfs|length }} ETFs tracked · click any ticker in the sidebar to focus</div>
    </div>

    <!-- Filter bar -->
    <div class="univ-fb">
      <div class="fb-row">
        <span class="fb-label">Sector</span>
        <div id="sec-chips" style="display:flex;flex-wrap:wrap;gap:5px"></div>
      </div>
      <div class="fb-row">
        <span class="fb-label">Provider</span>
        <div id="prov-chips" style="display:flex;flex-wrap:wrap;gap:5px"></div>
      </div>
      <div class="fb-row">
        <span class="fb-label">Fund</span>
        <div id="fund-chips" style="display:flex;flex-wrap:wrap;gap:5px"></div>
      </div>
      <span class="univ-count" id="univ-count"></span>
    </div>

    <!-- ETF body -->
    <div id="univ-body"></div>
  </div>
</div>

<script>
const SL = {{ sector_labels|tojson }};

const ETFS = [
{% for e in etfs %}
{% set provider = 'iShares' if 'iShares' in e.name else
                  'Vanguard' if 'Vanguard' in e.name else
                  'VanEck' if 'VanEck' in e.name else
                  'Amundi' if 'Amundi' in e.name or 'LYCS' in e.ticker else
                  'SPDR' if 'SPDR' in e.name or 'StSt' in e.name else
                  'HSBC' if 'HSBC' in e.name else
                  'Xtrackers' if 'Xtrackers' in e.name else
                  'Invesco' if 'Invesco' in e.name else
                  'Global X' if 'Global X' in e.name else
                  'L&G' if 'L&G' in e.name or e.ticker == 'LGAG.L' else
                  'HANetf' if 'NATP' in e.ticker else '—' %}
  {ticker:{{ e.ticker|tojson }},name:{{ e.name|tojson }},sector:{{ e.sector|tojson }},provider:{{ provider|tojson }},funds:{{ (e.fund_codes.split('||') if e.fund_codes else [])|tojson }},desc:{{ ETF_DESC.get(e.ticker,'—')|tojson }}},
{% endfor %}
];

// ── State ──────────────────────────────────────────────────────────────────
let activeSec='ALL', activeProv='ALL', activeFund='ALL';

// ── Chip builder ───────────────────────────────────────────────────────────
function chip(wrap, label, val, type, on){
  const b=document.createElement('button');
  b.className='fc'+(on?' on':'');
  b.textContent=label; b.dataset.val=val; b.dataset.type=type;
  b.onclick=()=>{
    if(type==='sec')  activeSec=val;
    if(type==='prov') activeProv=val;
    if(type==='fund') activeFund=val;
    document.querySelectorAll(`.fc[data-type="${type}"]`).forEach(x=>x.classList.toggle('on',x.dataset.val===val));
    render(); rebuildSidebar();
  };
  wrap.appendChild(b);
}

function buildChips(){
  const sw=document.getElementById('sec-chips');
  const pw=document.getElementById('prov-chips');
  const fw=document.getElementById('fund-chips');
  chip(sw,'ALL','ALL','sec',true);
  [...new Set(ETFS.map(e=>e.sector))].forEach(s=>chip(sw,SL[s]||s,s,'sec'));
  chip(pw,'ALL','ALL','prov',true);
  [...new Set(ETFS.map(e=>e.provider).filter(p=>p&&p!=='—'))].sort().forEach(p=>chip(pw,p,p,'prov'));
  chip(fw,'ALL','ALL','fund',true);
  const allFunds=[...new Set(ETFS.flatMap(e=>e.funds))].sort();
  // IL funds first, then LG
  ['IL-','LG-'].forEach(pfx=>{
    allFunds.filter(f=>f.startsWith(pfx)).forEach(f=>{
      const short=f.replace('IL-','').replace('LG-','').replace(/_/g,' ');
      chip(fw, short, f, 'fund');
    });
  });
}

// ── Visibility ─────────────────────────────────────────────────────────────
function vis(e){
  if(activeSec!=='ALL'&&e.sector!==activeSec) return false;
  if(activeProv!=='ALL'&&e.provider!==activeProv) return false;
  if(activeFund!=='ALL'&&!e.funds.includes(activeFund)) return false;
  const q=document.getElementById('sb-search').value.toLowerCase().trim();
  if(q&&!e.ticker.toLowerCase().includes(q)&&!e.name.toLowerCase().includes(q)) return false;
  return true;
}

// ── Render main ────────────────────────────────────────────────────────────
function render(){
  const shown=ETFS.filter(vis);
  const groups={};
  shown.forEach(e=>{(groups[e.sector]=groups[e.sector]||[]).push(e);});
  let html='';
  Object.entries(groups).forEach(([sec,etfs])=>{
    html+=`<div class="sec-group"><div class="sec-group-hd"><span class="sec-group-label">${SL[sec]||sec}</span><span class="sec-group-n">(${etfs.length})</span></div><div class="etf-grid">`;
    etfs.forEach(e=>{
      const proxies=e.funds.map(f=>`<span class="etf-proxy">${f}</span>`).join('');
      html+=`<div class="etf-card" id="card-${e.ticker.replace('.','_')}"><div class="etf-card-hd"><span class="etf-ticker">${e.ticker}</span><span class="etf-sector-pill">${SL[e.sector]||e.sector}</span></div><div class="etf-fullname">${e.name}</div><div class="etf-desc">${e.desc}</div><div class="etf-meta"><span class="etf-badge">Provider <span>${e.provider}</span></span><span class="etf-badge">Exchange <span>LSE</span></span>${proxies}</div></div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('univ-body').innerHTML=html||'<div style="font-family:var(--mono);font-size:.8rem;color:var(--text3);padding:40px 0">No ETFs match current filters.</div>';
  document.getElementById('univ-count').textContent=shown.length<ETFS.length?shown.length+' of '+ETFS.length+' ETFs':shown.length+' ETFs';
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function rebuildSidebar(){
  const secOrder=[...new Set(ETFS.map(e=>e.sector))];
  let html='';
  secOrder.forEach(sec=>{
    const items=ETFS.filter(e=>e.sector===sec);
    const visItems=items.filter(vis);
    if(!visItems.length) return;
    html+=`<div><div class="sb-sec-hd">${SL[sec]||sec} <em>${visItems.length}</em></div>`;
    items.forEach(e=>{
      if(!vis(e)) return;
      html+=`<div class="sb-item" data-ticker="${e.ticker}" onclick="focusTicker('${e.ticker}')">${e.ticker}</div>`;
    });
    html+='</div>';
  });
  document.getElementById('sb-list').innerHTML=html;
}

function sbFilter(){ render(); rebuildSidebar(); }

// ── Focus ──────────────────────────────────────────────────────────────────
function focusTicker(ticker){
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const sb=document.querySelector(`.sb-item[data-ticker="${ticker}"]`);
  if(sb) sb.classList.add('active');
  const id='card-'+ticker.replace('.','_');
  const card=document.getElementById(id);
  if(!card) return;
  card.classList.add('focused');
  card.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(()=>card.classList.remove('focused'),2200);
}

// ── Init ───────────────────────────────────────────────────────────────────
buildChips(); render(); rebuildSidebar();
if(location.hash) setTimeout(()=>focusTicker(location.hash.slice(1)),350);
</script>
{% endblock %}
